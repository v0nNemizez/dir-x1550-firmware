name: Validate

# Firmware bygges lokalt med ./build.sh
# Toolchain caches i ghcr.io av toolchain.yml
#
# Denne workflowen validerer kun at patch-filene er gyldige

on:
  push:
    paths:
      - 'patches/**'
      - '.github/workflows/firmware.yml'
  pull_request:
  workflow_dispatch:

jobs:
  validate-patches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sjekk at patch-filer er gyldige
        run: |
          for patch in patches/*.patch; do
            [ -f "$patch" ] || continue
            echo "Validerer: $patch"
            # Sjekk at filen er et gyldig unified diff format
            if ! grep -q "^---" "$patch" || ! grep -q "^+++" "$patch"; then
              echo "FEIL: $patch er ikke et gyldig unified diff"
              exit 1
            fi
            echo "  OK: $patch"
          done
          echo "Alle patches er gyldige."
