name: Build Toolchain

on:
  push:
    paths:
      - 'Dockerfile.toolchain'
      - 'ct-ng.defconfig'
      - 'uclibc.config'
      - '.github/workflows/toolchain.yml'
  workflow_dispatch:  # Manuell kjøring

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/dir-x1550-toolchain

jobs:
  build-toolchain:
    runs-on: ubuntu-latest  # Native x86_64 – ingen emulering
    permissions:
      contents: read
      packages: write  # For å pushe til ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Beregn hash av konfig-filene – brukes som image-tag
      # Toolchainen rebuildes bare når noe faktisk endres
      - name: Beregn konfig-hash
        id: hash
        run: |
          HASH=$(sha256sum ct-ng.defconfig uclibc.config Dockerfile.toolchain | sha256sum | cut -c1-12)
          echo "value=$HASH" >> "$GITHUB_OUTPUT"
          echo "Konfig-hash: $HASH"

      - name: Logg inn på GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sjekk om toolchain-imaget allerede finnes med denne hashen
      - name: Sjekk om toolchain allerede er bygget
        id: check
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.hash.outputs.value }}"
          if docker manifest inspect "$IMAGE_REF" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Toolchain-image finnes allerede: $IMAGE_REF"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Toolchain må bygges."
          fi

      # Sett opp Docker Buildx med caching
      - name: Sett opp Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      # Bygg toolchain-builder image med cache fra GitHub Actions
      - name: Bygg toolchain-builder image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.toolchain
          push: false
          load: true
          tags: dir-x1550-toolchain-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Kjør toolchain-bygg og pakk resultatet inn i et nytt image
      - name: Bygg toolchain (45–90 min)
        if: steps.check.outputs.exists == 'false'
        run: |
          # Lag midlertidig katalog for toolchain-output (Linux-filsystem = case-sensitive)
          mkdir -p /tmp/toolchain

          docker run --rm \
            -v /tmp/toolchain:/toolchain \
            dir-x1550-toolchain-builder

          echo "Toolchain bygget. Innhold:"
          ls /tmp/toolchain/

      # Pakk toolchainen inn i et minimalt image og push til ghcr.io
      - name: Pakk og push toolchain-image
        if: steps.check.outputs.exists == 'false'
        run: |
          HASH="${{ steps.hash.outputs.value }}"
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE }}"

          # Lag et Dockerfile som kopierer toolchain inn i imaget
          cat > /tmp/Dockerfile.package << 'EOF'
          FROM scratch
          COPY toolchain/ /toolchain/
          EOF

          docker build \
            -f /tmp/Dockerfile.package \
            -t "${IMAGE_REF}:${HASH}" \
            -t "${IMAGE_REF}:latest" \
            /tmp/

          docker push "${IMAGE_REF}:${HASH}"
          docker push "${IMAGE_REF}:latest"

          echo "Toolchain tilgjengelig som: ${IMAGE_REF}:${HASH}"

      - name: Oppsummering
        run: |
          HASH="${{ steps.hash.outputs.value }}"
          echo "## Toolchain" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${HASH}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            echo "**Status:** Allerede bygget (cache-treff)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status:** Bygget og pushet til ghcr.io" >> "$GITHUB_STEP_SUMMARY"
          fi
